<template>
    <template if:true={renderBadges}>
        <div class="slds-theme_default slds-box slds-box_x-small">
            <div class="slds-grid slds-wrap">
                <template for:each={badges} for:item="badge">
                    <div
                        key={badge.label}
                        class="slds-text-color_default slds-badge slds-grid slds-grid_align-center slds-grid_vertical-align-center slds-var-m-around_xxx-small badge-neutral"
                        data-badgetype={badge.badgeType}
                        
                    ><lightning-button label={badge.label}
                    title={badge.label} onclick={navigateToData}></lightning-button>
                           
                        <template if:true={badge.helpText}>
                            <lightning-helptext
                                class="slds-var-m-left_xx-small"
                                content={badge.helpText}
                            ></lightning-helptext>
                        </template>
                    </div>
                </template>
            </div>
        </div>
    </template>
    <template if:false={renderBadges}
        ><div style="margin-bottom: calc(var(--lwc-cardSpacingMargin) * -1)"></div
    ></template>
    <lightning-button
            label="navigateToData "
            title="navigateToData"
            onclick={navigateToData}
            class="slds-m-right_x-small"
          ></lightning-button>
          <lightning-button
            label="navigateToRelatedRecordsPage "
            title="navigateToRelatedRecordsPage"
            onclick={navigateToRelatedRecordsPage}
            class="slds-m-right_x-small"
          ></lightning-button>
</template>
