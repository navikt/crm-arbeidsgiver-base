<template>
    <article class="slds-card slds-theme_default">
        <!-- HEADER WITH TOGGLE AND "NEW RECORD" BUTTON -->
        <div class="headerContainer slds-has-flexi-truncate" style={headerBackground}>
            <!-- Left Group: Icon, Title, Toggle Icon -->
            <h3 class="headerLeft slds-var-p-around_xx-small slds-has-flexi-truncate">
                <button
                    type="button"
                    onclick={toggleAccordion}
                    class="slds-button slds-has-flexi-truncate headerToggleAction"
                    aria-controls="accordionContent"
                    aria-expanded={isExpanded}
                >
                    <template if:true={icon}>
                        <lightning-icon
                            icon-name={icon}
                            size="small"
                            class="headerIcon slds-m-right_x-small"
                        ></lightning-icon>
                    </template>
                    <lightning-icon icon-name={chevronIcon} size="x-small" class="chevronIcon slds-m-right_xx-small">
                    </lightning-icon>
                    <span class="slds-truncate" title={cardTitle}> {cardTitle} </span>
                </button>
            </h3>
            <!-- Right Group: New Record Button -->
            <template if:true={showNewRecordButton}>
                <lightning-button
                    label={newRecordButtonLabel}
                    variant="brand"
                    onclick={handleNewRecord}
                    class="newRecordButton slds-m-left_small"
                >
                </lightning-button>
            </template>
        </div>

        <!-- TABLE RENDERED BASED ON EXPANSION STATE -->
        <template if:true={showRecords}>
            <!-- DESKTOP VIEW -->
            <template if:false={isMobile}>
                <div style={scrollableStyle} hidden={ariaHidden} data-id="accordionContent">
                    <table
                        class="slds-table slds-table_cell-buffer slds-table_bordered slds-max-medium-table_stacked-horizontal"
                        data-clickable={clickableRows}
                        style="table-layout: fixed"
                        aria-label={listDescription}
                    >
                        <thead>
                            <tr class="slds-line-height_reset">
                                <template for:each={fieldLabels} for:item="label">
                                    <th key={label.value} scope="col" style={label.headerStyle}>
                                        <div
                                            class="slds-truncate"
                                            style="display: flex; align-items: center; height: 100%; font-size: 0.75rem"
                                            title={label.value}
                                        >
                                            {label.value}
                                        </div>
                                    </th>
                                </template>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={displayedRecords} for:item="record" for:index="rowIndex">
                                <tr
                                    key={record.Id}
                                    data-record-id={record.Id}
                                    data-contact-id={record.ContactId}
                                    data-value={rowIndex}
                                    class={record.rowClass}
                                >
                                    <template for:each={record.recordFields} for:item="field">
                                        <template if:true={field.isFirst}>
                                            <th scope="row" key={field.fieldName}>
                                                <div class="slds-grid firstCell">
                                                    <template if:true={clickableRows}
                                                        ><a
                                                            class="slds-truncate"
                                                            title={field.value}
                                                            href={record.link}
                                                            data-record-id={record.Id}
                                                            onmouseenter={handleMouseEnter}
                                                            onmouseleave={handleMouseLeave}
                                                            onclick={handleRowClick}
                                                        >
                                                            {field.value}
                                                        </a></template
                                                    >

                                                    <template if:false={clickableRows}>
                                                        <div
                                                            class="slds-truncate"
                                                            title={field.value}
                                                            data-record-id={record.Id}
                                                            onmouseenter={handleMouseEnter}
                                                            onmouseleave={handleMouseLeave}
                                                        >
                                                            {field.value}
                                                        </div>
                                                    </template>

                                                    <lightning-button-icon
                                                        icon-name="utility:preview"
                                                        alternative-text="Vis detaljer"
                                                        onclick={handleOpenPopover}
                                                        data-record-id={record.Id}
                                                        class="popoverTrigger"
                                                        size="x-small"
                                                        variant="bare"
                                                        aria-expanded={record.isPopoverOpen}
                                                    ></lightning-button-icon>
                                                </div>
                                            </th>
                                        </template>

                                        <template if:false={field.isFirst}>
                                            <td key={field.fieldName} title={field.value}>
                                                <div class="slds-truncate">{field.value}</div>
                                            </td>
                                        </template>
                                    </template>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
            <!-- MOBILE VIEW -->
            <template if:true={isMobile}>
                <ul class="slds-has-dividers_bottom-space" hidden={ariaHidden} data-id="accordionContent">
                    <template for:each={displayedRecords} for:item="record">
                        <li class="slds-item" key={record.Id}>
                            <lightning-tile label={record.title} href={record.link}>
                                <dl class="slds-list_horizontal slds-wrap">
                                    <template for:each={record.recordFields} for:item="field">
                                        <template if:false={field.isFirst}>
                                            <dt
                                                key={field.fieldName}
                                                class="slds-item_label slds-text-color_weak slds-truncate"
                                                title={field.label}
                                            >
                                                {field.label}:
                                            </dt>
                                            <dd
                                                key={field.fieldName}
                                                class="slds-item_detail slds-truncate"
                                                title={field.value}
                                            >
                                                {field.value}
                                            </dd>
                                        </template>
                                    </template>
                                </dl>
                            </lightning-tile>
                        </li>
                    </template>
                </ul>
            </template>
        </template>

        <template if:true={showPopover}>
            <div
                class="slds-popover slds-nubbin_top slds-popover_medium"
                style={popoverStyle}
                role="dialog"
                onmouseenter={handlePopoverEnter}
                onmouseleave={handleMouseLeave}
            >
                <!-- Popover Header -->
                <div class="slds-popover__header">
                    <button
                        class="slds-button slds-button_icon slds-button_icon-small slds-float_right slds-popover__close"
                        onclick={handleClosePopoverClick}
                        title="Lukk"
                    >
                        <lightning-icon
                            icon-name="utility:close"
                            size="xx-small"
                            alternative-text="Lukk"
                        ></lightning-icon>
                    </button>
                    <div class="slds-media slds-media_center slds-has-flexi-truncate">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name={iconToUse} size="small"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <h2 id="popover-heading" class="slds-text-heading_small slds-hyphenate">{popoverTitle}</h2>
                        </div>
                    </div>
                </div>

                <!-- Popover Body -->
                <div class="slds-popover__body">
                    <template for:each={popoverFieldValues} for:item="fieldObj">
                        <p key={fieldObj.apiName} class="slds-truncate">
                            <strong>{fieldObj.apiName}:</strong> {fieldObj.value}
                        </p>
                    </template>
                </div>
            </div>
        </template>

        <!-- Modal with embedded screenflow -->
        <template if:true={showFlowModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container" style="width: 900px; max-width: 95%">
                    <header class="slds-modal__header">
                        <button
                            class="slds-button slds-button_icon slds-modal__close"
                            title="Avbryt og lukk"
                            onclick={handleCloseFlowModal}
                        >
                            <lightning-icon
                                icon-name="utility:close"
                                alternative-text="lukk"
                                size="small"
                            ></lightning-icon>
                            <span class="slds-assistive-text">Lukk</span>
                        </button>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-flow onstatuschange={handleFlowStatusChange}> </lightning-flow>
                    </div>
                </div>
            </section>

            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </article>
</template>
