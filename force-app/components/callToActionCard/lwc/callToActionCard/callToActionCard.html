<template>
    <lightning-card title={cardTitle}>
        <div class="slds-var-p-around_medium">
            <p class="slds-text-body_regular slds-var-m-bottom_medium">{cardText}</p>
            <lightning-button if:true={buttonLabel} label={buttonLabel} variant="brand" onclick={handleAction}>
            </lightning-button>
        </div>
    </lightning-card>

    <!-- Modal with embedded screenflow -->
    <template if:true={showFlowModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container" style="width: 900px; max-width: 95%">
                <header class="slds-modal__header">
                    <button
                        class="slds-button slds-button_icon slds-modal__close"
                        title="Avbryt og lukk"
                        onclick={closeModal}
                    >
                        <lightning-icon icon-name="utility:close" alternative-text="Lukk" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Lukk</span>
                    </button>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-flow onstatuschange={handleStatusChange}> </lightning-flow>
                </div>
            </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
